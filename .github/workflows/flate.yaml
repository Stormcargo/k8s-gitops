---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "Flate"

on:
  workflow_dispatch:
  pull_request:
    branches: ["main"]
    paths:
      - kubernetes/apps/**
      - kubernetes/flux/**

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  flate:
    name: Flate ${{ matrix.resource }}
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    strategy:
      matrix:
        resource: ["helmrelease", "kustomization"]
      max-parallel: 4
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Flate
        uses: home-operations/flate/action@39f44bd8bc9f11ba5321cecbdfc04398a568f4d0 # v0.3.3

      - name: Run Flate Diff
        id: diff
        run: |
          echo 'diff<<EOF' >> $GITHUB_OUTPUT
          flate diff ${{ matrix.resource }} \
            --path ./kubernetes/flux/config \
            --strip-attr "helm.sh/chart" \
            --strip-attr "checksum/config" \
            --strip-attr "app.kubernetes.io/version" \
            --strip-attr "chart" >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

      - name: Add PR Comment
        if: ${{ steps.diff.outputs.diff != '' }}
        uses: mshick/add-pr-comment@v3
        with:
          message-id: "${{ github.event.pull_request.number }}/kubernetes/${{ matrix.resource }}"
          message-failure: Diff was not successful
          message: |
            ```diff
            ${{ steps.diff.outputs.diff }}
            ```

  flux-test:
    name: Flux Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Flate
        uses: home-operations/flate/action@39f44bd8bc9f11ba5321cecbdfc04398a568f4d0 # v0.3.3
        with:
          base: ""

      - name: Run Flate Test
        run: flate test all --path ./kubernetes/flux/config --allow-missing-secrets

  flate-success:
    needs: ["flate", "flux-test"]
    if: ${{ always() }}
    name: Flux Diff successful
    runs-on: ubuntu-latest
    steps:
      - name: Check flate status
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
