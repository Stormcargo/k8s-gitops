sonarr:
  series:
    base_url: http://sonarr.media.svc.cluster.local
    api_key: !env_var SONARR_API_KEY

    delete_old_custom_formats: true
    replace_existing_custom_formats: true

    media_management:
      propers_and_repacks: do_not_prefer

    media_naming:
      episodes:
        anime: default
        daily: default
        rename: true
        standard: default
      season: default
      series: plex-imdb

    quality_definition:
      type: series

    quality_profiles:
      - trash_id: 72dae194fc92bf828f32cde7744e51a1 # WEB-1080p
        name: WEB-1080p
        reset_unmatched_scores:
          enabled: true

      - trash_id: d1498e7d189fbe6c7110ceaabb7473e6 # WEB-2160p
        name: WEB-2160p
        reset_unmatched_scores:
          enabled: true

      - name: WEB-Fallback
        reset_unmatched_scores:
          enabled: true

    custom_formats:
      - trash_ids:
          - 32b367365729d530ca1c124a0b180c64 # Bad Dual Groups
          - 82d40da2bc6923f41e14394075dd4b03 # No-RlsGroup
          - e1a997ddb54e3ecbfe06341ad323c458 # Obfuscated
          - 06d66ab109d4d2eddb2794d21526d140 # Retags
        assign_scores_to:
          - name: WEB-1080p
          - name: WEB-2160p
          - name: WEB-Fallback

      - trash_ids:
          - 5d9fd1b1e06cd8a475462f40214b7df6 # FLUX
        assign_scores_to:
          - name: WEB-1080p
            score: 100
          - name: WEB-2160p
            score: 100

      - trash_ids:
          - 9f6cbff8cfe4ebbc1bde14c7b7bec0de # Remux
          - ed27ebfef2f323e964fb1f61391bcb35 # BR-DISK
        assign_scores_to:
          - name: WEB-1080p
          - name: WEB-2160p
        score: -100

radarr:
  movies:
    base_url: http://radarr.media.svc.cluster.local
    api_key: !env_var RADARR_API_KEY

    delete_old_custom_formats: true
    replace_existing_custom_formats: true

    media_management:
      propers_and_repacks: do_not_prefer

    media_naming:
      folder: plex-imdb
      movie:
        rename: true
        standard: plex-imdb

    quality_definition:
      type: movie

    quality_profiles:
      - trash_id: 5128baeb2b081b72126bc8482b2a86a0 # SQP-1 (2160p)
        name: SQP-2160p
        reset_unmatched_scores:
          enabled: true

