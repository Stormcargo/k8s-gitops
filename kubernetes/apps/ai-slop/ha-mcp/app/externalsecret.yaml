---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ha-mcp
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: ha-mcp
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        token: "{{ .MCP_TOKEN }}"
  dataFrom:
    - extract:
        key: Cluster Home Assistant
