---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-mcp
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: grafana-mcp
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        token: "{{ .GRAFANA_SA_TOKEN }}"
  dataFrom:
    - extract:
        key: grafana
