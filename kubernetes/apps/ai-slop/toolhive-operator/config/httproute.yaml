---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: toolhive
  namespace: ai-slop
spec:
  parentRefs:
    - name: internal
      namespace: network
      sectionName: https
  hostnames:
    - "mcp.${SECRET_DOMAIN}"
  rules:
    - backendRefs:
        - name: vmcp-tools-gateway
          port: 4483
      timeouts:
        request: 3600s
        backendRequest: 3600s
