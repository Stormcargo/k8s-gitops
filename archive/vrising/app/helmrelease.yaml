---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name vrising
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    replace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      strategy: rollback
    cleanupOnFail: true
  uninstall:
    keepHistory: false

  values:
    controllers:
      vrising:
        replicas: 0
        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          app:
            nameOverride: *name
            image:
              repository: trueosiris/vrising
              tag: "2.1"
              pullPolicy: IfNotPresent

            resources:
              requests:
                memory: 3Gi
                cpu: 1
              limits:
                memory: 10Gi

            env:
              TZ: ${TIMEZONE}
              GAMEPORT: &server 9876
              QUERYPORT: &query 9877
              MAX_USERS: 4
              MAX_ADMIN: 2

            envFrom:
              - secretRef:
                  name: vrising-secret

            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false

    service:
      app:
        controller: *name
        type: LoadBalancer
        loadBalancerIP: ${SVC_VRISING_ADDRESS}
        ports:
          steam1:
            port: *server
            protocol: UDP
          steam2:
            port: *query
            protocol: UDP

    persistence:
      config:
        existingClaim: *name
      server:
        type: emptyDir
        globalMounts:
          - path: /mnt/vrising/server
